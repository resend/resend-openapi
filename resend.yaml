          description: Return any 2xx status code to acknowledge receipt of the event.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    PaginationLimit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
      description: Number of items to return.
    PaginationAfter:
      in: query
      name: after
      required: false
      schema:
        type: string
      description: Return items after this cursor.
    PaginationBefore:
      in: query
      name: before
      required: false
      schema:
        type: string
      description: Return items before this cursor.
  schemas:
    SendEmailRequest:
      type: object
      required:
        - from
        - to
        - subject
      properties:
        from:
          type: string
          description: Sender email address. To include a friendly name, use the format "Your Name <sender@domain.com>".
        to:
          description: Recipient email address. For multiple addresses, send as an array of strings. Max 50.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
              minItems: 1
              maxItems: 50
        subject:
          type: string
          description: Email subject.
        bcc:
          description: Bcc recipient email address. For multiple addresses, send as an array of strings.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        cc:
          description: Cc recipient email address. For multiple addresses, send as an array of strings.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        reply_to:
          description: Reply-to email address. For multiple addresses, send as an array of strings.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        html:
          type: string
          description: The HTML version of the message.
        text:
          type: string
          description: The plain text version of the message.
        template:
          allOf:
            - $ref: '#/components/schemas/EmailTemplateInput'
            - description: Use a published template to send the email. If provided, do not include html or text.
        headers:
          type: object
          description: Custom headers to add to the email.
        scheduled_at:
          type: string
          description: Schedule email to be sent later. The date should be in ISO 8601 format.
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        topic_id:
          type: string
          description: The topic ID to scope the email to. If the recipient is a contact and opted-in to the topic, the email is sent. If opted-out, the email is not sent. If the recipient is not a contact, the email is sent if the topic's default subscription is opt_in.
    Attachment:
      type: object
      properties:
        content:
          type: string
          format: binary
          description: Content of an attached file.
        filename:
          type: string
          description: Name of attached file.
        path:
          type: string
          description: Path where the attachment file is hosted
        content_type:
          type: string
          description: Optional content type for the attachment, if not set it will be derived from the filename property
        content_id:
          type: string
          description: Content ID for embedding inline images using cid references (e.g., cid:image001).
    Tag:
      type: object
      properties:
        name:
          type: string
          description: The name of the email tag. It can only contain ASCII letters (a–z, A–Z), numbers (0–9), underscores (_), or dashes (-). It can contain no more than 256 characters.
        value:
          type: string
          description: The value of the email tag.It can only contain ASCII letters (a–z, A–Z), numbers (0–9), underscores (_), or dashes (-). It can contain no more than 256 characters.
    EmailTemplateInput:
      type: object
      properties:
        id:
          type: string
          description: The id of the published email template.
        variables:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
          description: Template variables object with key/value pairs.
          example:
            variableName: 'Sign up now'
            variableName2: 123
      required:
        - id
    SendEmailResponse:
      type: object
      properties:
        id:
          type: string
          description: The ID of the sent email.
    UpdateEmailOptions:
      type: object
      properties:
        scheduled_at:
          type: string
          description: Schedule email to be sent later. The date should be in ISO 8601 format.
    Email:
      type: object
      properties:
        object:
          type: string
          description: The type of object.
          example: 'email'
        id:
          type: string
          description: The ID of the email.
          example: '4ef9a417-02e9-4d39-ad75-9611e0fcc33c'
        message_id:
          type: string
          description: The Message-ID header value of the email.
          example: '<202301010000.4ef9a417@email.example.com>'
        to:
          type: array
          items:
            type: string
            description: The email addresses of the recipients.
          example: ['delivered@resend.dev']
        from:
          type: string
          description: The email address of the sender.
          example: 'Acme <onboarding@resend.dev>'
        created_at:
          type: string
          format: date-time
          description: The date and time the email was created.
          example: '2023-04-03T22:13:42.674981+00:00'
        subject:
          type: string
          description: The subject line of the email.
          example: 'Hello World'
        html:
          type: string
          description: The HTML body of the email.
          example: 'Congrats on sending your <strong>first email</strong>!'
        text:
          type: string
          description: The plain text body of the email.
        bcc:
          type: array
          items:
            type: string
          description: The email addresses of the blind carbon copy recipients.
        cc:
          type: array
          items:
            type: string
          description: The email addresses of the carbon copy recipients.
        reply_to:
          type: array
          items:
            type: string
          description: The email addresses to which replies should be sent.
        last_event:
          type: string
          description: The status of the email.
          enum:
            - bounced
            - canceled
            - clicked
            - complained
            - delivered
            - delivery_delayed
            - failed
            - opened
            - queued
            - scheduled
            - sent
            - suppressed
          example: 'delivered'
    ListEmailsResponse:
      type: object
      properties:
        object:
          type: string
          description: Type of the response object.
          example: 'list'
        has_more:
          type: boolean
          description: Indicates if there are more results available.
          example: false
        data:
          type: array
          description: Array containing email information.
          items:
            $ref: '#/components/schemas/Email'
    CreateBatchEmailsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The ID of the sent email.
    DomainCapabilities:
      type: object
      description: Configure the domain capabilities for sending and receiving emails. At least one capability must be enabled.
      properties:
        sending:
          type: string
          enum:
            - enabled
            - disabled
          description: Enable or disable sending emails from this domain.
        receiving:
          type: string
          enum:
            - enabled
            - disabled
          description: Enable or disable receiving emails to this domain.
    CreateDomainRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the domain you want to create.
        region:
          type: string
          enum:
            - us-east-1
            - eu-west-1
            - sa-east-1
            - ap-northeast-1
          default: us-east-1
          description: The region where emails will be sent from. Possible values are us-east-1 | eu-west-1 | sa-east-1 | ap-northeast-1
        custom_return_path:
          type: string
          description: For advanced use cases, choose a subdomain for the Return-Path address. Defaults to 'send' (i.e., send.yourdomain.tld).
        open_tracking:
          type: boolean
          description: Track the open rate of each email.
        click_tracking:
          type: boolean
          description: Track clicks within the body of each HTML email.
        tls:
          type: string
          enum:
            - opportunistic
            - enforced
          default: opportunistic
          description: TLS mode. Opportunistic attempts secure connection but falls back to unencrypted. Enforced requires TLS or email won't be sent.
        capabilities:
          $ref: '#/components/schemas/DomainCapabilities'
        tracking_subdomain:
          type: string
          description: The subdomain to use for click and open tracking.
    CreateDomainResponse:
      type: object
      properties:
        id:
          type: string
          description: The ID of the domain.
        name:
          type: string
          description: The name of the domain.
        created_at:
          type: string
          format: date-time
          description: The date and time the domain was created.
        status:
          type: string
          enum:
            - pending
            - verified
            - failed
            - not_started
            - partially_verified
            - partially_failed
          description: The status of the domain.
        capabilities:
          $ref: '#/components/schemas/DomainCapabilities'
        records:
          type: array
          items:
            $ref: '#/components/schemas/DomainRecord'
        region:
          type: string
          description: The region where the domain is hosted.
        open_tracking:
          type: boolean
          description: Whether open tracking is enabled for this domain.
        click_tracking:
          type: boolean
          description: Whether click tracking is enabled for this domain.
        tracking_subdomain:
          type: string
          description: The subdomain used for click and open tracking.
    UpdateDomainOptions:
      type: object
      properties:
        open_tracking:
          type: boolean
          description: Track the open rate of each email.
        click_tracking:
          type: boolean
          description: Track clicks within the body of each HTML email.
        tls:
          type: string
          description: enforced | opportunistic.
          default: "opportunistic"
        capabilities:
          $ref: '#/components/schemas/DomainCapabilities'
        tracking_subdomain:
          type: string
          description: The subdomain to use for click and open tracking.
    DomainRecord:
      type: object
      properties:
        record:
          type: string
          enum:
            - SPF
            - DKIM
            - Receiving
            - Tracking
            - TrackingCAA
          description: The type of record (SPF for sending, DKIM for sending, Receiving for inbound emails, Tracking & TrackingCAA for click and open tracking).
        name:
          type: string
          description: The name of the DNS record.
        type:
          type: string
          enum:
            - MX
            - TXT
            - CNAME
            - CAA
          description: The DNS record type.
        ttl:
          type: string
          description: The time to live for the record.
        status:
          type: string
          enum:
            - pending
            - verified
            - failed
            - temporary_failure
            - not_started
          description: The status of the record.
        value:
          type: string
          description: The value of the record.
        priority:
          type: integer
          description: The priority of the record (only applicable for MX records).
    Domain:
      type: object
      properties:
        object:
          type: string
          description: The type of object.
          example: 'domain'
        id:
          type: string
          description: The ID of the domain.
          example: 'd91cd9bd-1176-453e-8fc1-35364d380206'
        name:
          type: string
          description: The name of the domain.
          example: 'example.com'
        status:
          type: string
          enum:
            - pending
            - verified
            - failed
            - not_started
            - partially_verified
            - partially_failed
          description: The status of the domain.
          example: 'not_started'
        created_at:
          type: string
          format: date-time
          description: The date and time the domain was created.
          example: '2023-04-26T20:21:26.347412+00:00'
        region:
          type: string
          description: The region where the domain is hosted.
          example: 'us-east-1'
        open_tracking:
          type: boolean
          description: Whether open tracking is enabled for this domain.
        click_tracking:
          type: boolean
          description: Whether click tracking is enabled for this domain.
        tracking_subdomain:
          type: string
          description: The subdomain used for click and open tracking.
        capabilities:
          $ref: '#/components/schemas/DomainCapabilities'
        records:
          type: array
          items:
            $ref: '#/components/schemas/DomainRecord'
    CreateDomainClaimRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the domain you want to claim.
        region:
          type: string
          enum:
            - us-east-1
            - eu-west-1
            - sa-east-1
            - ap-northeast-1
          default: us-east-1
          description: The region where emails will be sent from. Possible values are us-east-1 | eu-west-1 | sa-east-1 | ap-northeast-1
        custom_return_path:
          type: string
          default: send
          description: For advanced use cases, choose a subdomain for the Return-Path address. Defaults to 'send' (i.e., send.yourdomain.tld).
        open_tracking:
          type: boolean
          description: Track the open rate of each email.
        click_tracking:
          type: boolean
          description: Track clicks within the body of each HTML email.
        tracking_subdomain:
          type: string
          description: The subdomain to use for click and open tracking.
    DomainClaimRecord:
      type: object
      description: The TXT record to add to your DNS to prove ownership of the claimed domain.
      properties:
        type:
          type: string
          enum:
            - TXT
          description: The DNS record type. Always TXT for domain claims.
          example: 'TXT'
        name:
          type: string
          description: The name of the DNS record (the domain being claimed).
          example: 'example.com'
        value:
          type: string
          description: The value of the TXT record.
          example: 'resend-domain-verification=abc123'
        ttl:
          type: string
          description: The time to live for the record.
          example: 'Auto'
    DomainClaim:
      type: object
      properties:
        object:
          type: string
          description: The type of object.
          example: 'domain_claim'
        id:
          type: string
          description: The ID of the claim.
          example: 'd91cd9bd-1176-453e-8fc1-35364d380206'
        name:
          type: string
          description: The name of the domain being claimed.
          example: 'example.com'
        status:
          type: string
          enum:
            - pending
            - verified
            - completed
            - blocked
            - expired
            - superseded
            - canceled
            - failed
          description: The status of the claim.
          example: 'pending'
        domain_id:
          type: [string, "null"]
          description: The ID of the placeholder domain created for the claim.
          example: 'a1b2c3d4-1176-453e-8fc1-35364d380206'
        region:
          type: [string, "null"]
          enum:
            - us-east-1
            - eu-west-1
            - sa-east-1
            - ap-northeast-1
            - null
          description: The region where the claimed domain will send from.
          example: 'us-east-1'
        record:
          $ref: '#/components/schemas/DomainClaimRecord'
        blocked_reason:
          type: [string, "null"]
          enum:
            - grace_period
            - recent_owner_activity
            - pending_scheduled_emails
            - null
          description: Why the claim is currently blocked, if applicable.
          example: null
        failure_reason:
          type: [string, "null"]
          description: Why the claim failed, if applicable.
          example: null
        created_at:
          type: string
          format: date-time
          description: The date and time the claim was created.
          example: '2023-04-26T20:21:26.347412+00:00'
        expires_at:
          type: string
          format: date-time
          description: The date and time the claim expires if not verified.
          example: '2023-05-03T20:21:26.347412+00:00'
    VerifyDomainResponse:
      type: object
      properties:
        object:
          type: string
          description: The type of object.
          example: 'domain'
        id:
          type: string
          description: The ID of the domain.
          example: 'd91cd9bd-1176-453e-8fc1-35364d380206'
    ListDomainsResponse:
      type: object
      properties:
        object:
          type: string
          description: Type of the response object.
          example: 'list'
        has_more:
          type: boolean
          description: Indicates if there are more results available.
          example: false
        data:
          type: array
          items:
            $ref: '#/components/schemas/ListDomainsItem'
    ListDomainsItem:
      type: object
      properties:
        id:
          type: string
          description: The ID of the domain.
          example: 'd91cd9bd-1176-453e-8fc1-35364d380206'
        name:
          type: string
          description: The name of the domain.
          example: 'example.com'
        status:
          type: string
          enum:
            - pending
            - verified
            - failed
            - not_started
            - partially_verified
            - partially_failed
          description: The status of the domain.
          example: 'not_started'
        created_at:
          type: string
          format: date-time
          description: The date and time the domain was created.
          example: '2023-04-26T20:21:26.347412+00:00'
        region:
          type: string
          description: The region where the domain is hosted.
          example: 'us-east-1'
        capabilities:
          $ref: '#/components/schemas/DomainCapabilities'
    UpdateDomainResponseSuccess:
      type: object
      properties:
        id:
          type: string
          description: The ID of the updated domain.
          example: 'd91cd9bd-1176-453e-8fc1-35364d380206'
        object:
          type: string
          description: The object type representing the updated domain.
          example: 'domain'
    DeleteDomainResponse:
      type: object
      properties:
        object:
          type: string
          description: The type of object.
          example: 'domain'
        id:
          type: string
          description: The ID of the domain.
          example: 'd91cd9bd-1176-453e-8fc1-35364d380206'
        deleted:
          type: boolean
          description: Indicates whether the domain was deleted successfully.
          example: true
    CreateApiKeyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The API key name.
        permission:
          type: string
          enum:
            - full_access
            - sending_access
          description: The API key can have full access to Resend’s API or be only restricted to send emails. * full_access - Can create, delete, get, and update any resource. * sending_access - Can only send emails.
        domain_id:
          type: string
          description: Restrict an API key to send emails only from a specific domain. Only used when the permission is sending_access.
    CreateApiKeyResponse:
      type: object
      properties:
        id:
          type: string
          description: The ID of the API key.
        token:
          type: string
          description: The token of the API key.
    ListApiKeysResponse:
      type: object
      properties:
        object:
          type: string
          description: Type of the response object.
          example: 'list'
        has_more:
          type: boolean
          description: Indicates if there are more results available.
          example: false
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApiKey'
    ApiKey:
      type: object
      properties:
        id:
          type: string
          description: The ID of the API key.
        name:
