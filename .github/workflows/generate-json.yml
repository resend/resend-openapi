name: Generate JSON spec

on:
  push:
    branches: [main]
    paths: [resend.yaml]

permissions: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Convert YAML to JSON
        run: yq -o=json resend.yaml > resend.json

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet resend.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          commit-message: 'chore: update resend.json'
          title: 'chore: update resend.json'
          branch: chore/update-resend-json
          body: 'Auto-generated from `resend.yaml` changes.'
