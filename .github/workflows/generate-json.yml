name: Generate JSON spec

on:
  push:
    branches: [main]
    paths: [resend.yaml]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Convert YAML to JSON
        run: yq -o=json resend.yaml > resend.json

      - name: Commit resend.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resend.json
          git diff --cached --quiet || git commit -m "chore: update resend.json"
          git push
