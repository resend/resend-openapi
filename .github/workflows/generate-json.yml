name: Generate JSON spec

on:
  push:
    branches: [main]
    paths: [resend.yaml]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Convert YAML to JSON
        run: yq -o=json resend.yaml > resend.json

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet resend.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update resend.json'
          title: 'chore: update resend.json'
          branch: chore/update-resend-json
          body: 'Auto-generated from `resend.yaml` changes.'
